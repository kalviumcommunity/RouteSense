<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | RouteSense</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div id="app">
        <!-- Navigation -->
        <nav id="main-nav">
            <div class="logo">
                <div class="logo-icon">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2c0 7.3-8 11.8-8 11.8z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </div>
                <span>RouteSense</span>
            </div>
            <div class="nav-links" id="nav-links">
                <button class="btn btn-ghost" onclick="navigateTo('landing')">Home</button>
                <button class="btn btn-ghost" onclick="navigateTo('signin')">Sign In</button>
                <button class="btn btn-primary" onclick="navigateTo('signup')">Get Started</button>
            </div>
        </nav>

        <!-- Sign In View -->
        <main class="view active">
            <div class="auth-container">
                <div class="auth-card glass-card">
                    <h2>Welcome Back</h2>
                    <p>Enter your details to access your dashboard.</p>
                    <form id="signin-form" onsubmit="handleAuth(event, 'dashboard')">
                        <div class="form-group">
                            <label for="signin-email">Email Address</label>
                            <input type="email" id="signin-email" placeholder="name@company.com" required>
                        </div>
                        <div class="form-group">
                            <label for="signin-password">Password</label>
                            <div style="position: relative;">
                                <input type="password" id="signin-password" placeholder="••••••••" required style="padding-right: 48px;">
                                <button type="button" onclick="togglePasswordVisibility('signin-password', 'eye-icon-signin')" style="position: absolute; right: 16px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center;">
                                    <svg id="eye-icon-signin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                        <circle cx="12" cy="12" r="3"></circle>
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="form-options">
                            <label class="checkbox-label">
                                <input type="checkbox"> Remember me
                            </label>
                            <a href="#" class="text-link">Forgot password?</a>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
                    </form>
                    <div class="auth-footer">
                        Don't have an account? <a href="#" onclick="navigateTo('signup')" class="text-link">Sign up</a>
                    </div>
                </div>
            </div>
        </main>
    </div>
    <script src="js/app.js"></script>
</body>
</html>
